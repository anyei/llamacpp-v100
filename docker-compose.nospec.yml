# Non-speculative profile — 2026-07-06 tuning round.
# Measured (Qwen3.6-27B, 2x V100): 48 t/s single-stream, 89.6 t/s aggregate
# at -np 4. Use this profile for heavy multi-client load on images older than
# the full-seq split fix; otherwise the MTP profile is faster everywhere.
#
# KV cache q8_0 is verified lossless on this model (ppl 6.2922 vs 6.2904 f16
# at 32k ctx, temp-0 output byte-identical) and halves KV memory at 262k ctx.
# Remove the two --cache-type-* lines to trade that memory back for ~3% tg.

services:
  llama-tq:
    container_name: llama-tq-nospec-GLM-4.7-Flash-REAP-23B-A3B-UD-Q4_K_XL.gguf
    image: llamacpp-local-v100:latest
    volumes:
      - ${MODELS_DIR:-./models}:/models
      - ${MODELS2_DIR:-./models2}:/models2
      - ./cache:/models/cache
    ports:
      - "8097:8080"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - CUDA_VISIBLE_DEVICES=0,1
      # one-shot P2P AllReduce over NVLink for small tensors (+1.2% tg),
      # falls back to NCCL for large/unsupported cases
      - GGML_CUDA_ALLREDUCE=p2p
      # small-batch decode graph cache (helps multi-slot shape churn even
      # without speculation; needs image >= commit 9bac6eead, ignored otherwise)
      - LLAMA_DECODE_GRAPH_CACHE=4
      - LLAMA_DECODE_GRAPH_CACHE_TOKENS=64
      # meta-backend compute-container ring; must cover the cached graphs above
      - GGML_META_MAX_GRAPHS=8
#      --mmproj /models/qwen3.6-27b-mmproj-f16.gguf
#      --rope-scaling yarn
#      --rope-scale 1.4441
#      --yarn-orig-ctx 262144
    command: >
      -m /models/GLM-4.7-Flash-REAP-23B-A3B-UD-Q4_K_XL.gguf
      --host 0.0.0.0
      --port 8080
      -ngl 99
      -sm tensor
      -ts 0.5,0.5
      -t 10
      -np 1
      -c 50000
      --batch-size 4096
      --ubatch-size 4096
      --cont-batching
      --timeout 10
      --no-mmap
      --cache-prompt
      --cache-ram 12288
      --ctx-checkpoints 8
      -fit off
      -fa on
      --no-prefill-assistant
    restart: always
