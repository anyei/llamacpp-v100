# CUDA RPC worker — distributed-inference worker for a box with an NVIDIA GPU.
# Companion to docker-compose.rpc-worker{-cpu,-vulkan}.yml.
#
# Preferred: PULL the image from the fleet registry on the V100 box — CUDA arch
# cross-builds fine from there and the worker boxes are slow builders
# (docs/dev-workflow.md §1b; one-time: add 10.5.5.1:5000 to insecure-registries):
#   docker pull 10.5.5.1:5000/llamacpp-cuda:75-<tag>
#   WORKER_IMAGE=10.5.5.1:5000/llamacpp-cuda:75-<tag> docker compose -f docker-compose.rpc-worker-cuda.yml up -d
#
# Fallback — build on the worker box from this tree, targeting ITS GPU arch
# (70=V100, 75=GTX16xx/RTX20xx, 86=RTX30xx, 89=RTX40xx):
#   docker build -f .devops/cuda.Dockerfile --build-arg CUDA_DOCKER_ARCH=75 \
#     --target full -t llamacpp-cuda:rpc-worker .
# (either way the box needs the NVIDIA driver + nvidia-container-toolkit)
#
# The coordinator connects the same as any worker:
#   --rpc <workerhost>:50052 -sm layer -ngl 99
#
# GTX 16xx note (TU116/117, e.g. 1660 Ti): cc 7.5 without tensor cores. On
# images with the task-32 fix (> e08854d4b) the FA MMA kernel self-heals
# (falls back to the tile kernel; set GGML_CUDA_FA_NO_MMA=1 below to skip
# even the first attempt). On OLDER images it crashes the worker — pass
# -fa off on the COORDINATOR there.
#
# VRAM note: layers assigned to this worker must fit its VRAM (e.g. a 6 GB
# 1660 Ti holds ~a quarter of a 23 GB model — weight the split with -ts, or
# run a small model whole). To expose the box's CPU alongside the GPU as a
# second pipeline stage, add:  -d CUDA0,CPU  to the command below.
#
# The model file is NOT needed on the worker; weights stream from the
# coordinator and are hash-cached under /cache.
#
# SECURITY: the RPC protocol has no auth or TLS. Bind only to a private or
# WireGuard/overlay network, never a public interface.

services:
  llama-rpc-worker-cuda:
    container_name: llama-rpc-worker-cuda
    image: ${WORKER_IMAGE:-llamacpp-cuda:rpc-worker}
    entrypoint: /app/ggml-rpc-server
    network_mode: host              # direct sockets; see security note
    volumes:
      - ./cache-rpc:/cache
      # optional worker-local GGUF dir for --model-dir (skips first-load streaming;
      # point WORKER_MODELS_DIR at the dir holding your .gguf copies)
      - ${WORKER_MODELS_DIR:-./models-local}:/local-models:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - CUDA_VISIBLE_DEVICES=${WORKER_GPUS:-0}
      - LLAMA_CACHE=/cache          # required for -c to land in the mounted volume
      # optional cache size cap (MiB): LRU-evict after each save; 0/unset = unlimited
      - GGML_RPC_CACHE_LIMIT_MIB=${WORKER_CACHE_LIMIT_MIB:-0}
      # persistent worker threadpool + busy-poll level (0-100); unset = disposable
      # pool per subgraph (old behavior). Spin trades idle cores for wake latency.
      - GGML_RPC_THREADPOOL_POLL=${WORKER_THREADPOOL_POLL:-}
    # --announce: LAN presence beacon (UDP multicast, same interface as -H) so a
    # coordinator with --rpc-discover finds this worker without a static --rpc list.
    # Remove the flag to opt out; --announce-group ADDR:PORT to use a custom group.
    command: >
      -H ${WORKER_BIND:-0.0.0.0}
      -p ${WORKER_PORT:-50052}
      -c
      --announce
      ${WORKER_EXTRA_ARGS:-}
    restart: always
