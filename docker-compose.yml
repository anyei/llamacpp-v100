services:
  # Llama.cpp backend
  llama-tq:
    #container_name: llama-tq-backend-Qwen3.6-27B-UD-Q4_K_XL.gguf
    container_name: llama-tq-backend-Qwen3.6-27B-UD-Q4_K_XL-MTP.gguf
   # image: ghcr.io/ggml-org/llama.cpp:server-cuda12
   # image: llamacpp-turboq-llama-tq:latest
    image: llamacpp-local-v100:latest 
    volumes:
      - ${MODELS_DIR:-./models}:/models
      - ${MODELS2_DIR:-./models2}:/models2
      - ./cache:/models/cache
    ports:
      - "8097:8080"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - CUDA_VISIBLE_DEVICES=0,1
# no-ops on V100 / this build, removed (see bench notes 2026-07-05):
#      - NCCL_DEBUG=INFO            # just log noise, NCCL confirmed working over NVLink P2P
#      - CUDA_SCALE_LAUNCH_QUEUES=4 # not a real CUDA variable
#      - GGML_CUDA_GRAPH_OPT=1      # CUDA graphs hard-disabled on cc < 8.0
#      - GGML_CUDA_FORCE_CUBLAS=1   # compile-time flag only, env var does nothing
#      - TURBO_AUTO_ASYMMETRIC=0
#     - GGML_CUDA_P2P=1
#      --ctx-size 500000
#      --rope-scaling yarn
#      --rope-scale 1.4441
#      --yarn-orig-ctx 262144
#      --cache-type-k turbo4
#      --cache-type-v turbo4
#      --mmproj /models/qwen3.6-27b-mmproj-f16.gguf
#      --spec-type draft-mtp
#      --spec-draft-n-max 2
#--spec-type draft-mtp
#      --spec-draft-n-max 3
#      --spec-draft-n-min 1
#      --spec-draft-p-min 0.70
# NOTE (2026-07-10): this default profile is SUPERSEDED by docker-compose.mtp.yml,
# which uses the tuned spec params (p-min 0.75 / n-min 1 — SAFE since commit
# d2b706d1b pads drafts to n-max, so the old "any p-min > 0 rebuilds the graph"
# advice below no longer applies) and carries the decode-graph-cache envs.
# The old "-np > 1 with spec degrades" issue is also FIXED (full-seq ubatch
# split; 4-conc spec aggregate 125+ t/s). Kept for reference; prefer mtp.yml.
    command: >
      -m /models/Qwen3.6-27B-UD-Q4_K_XL-MTP.gguf
      --mmproj /models/qwen3.6-27b-mmproj-f16.gguf
      --host 0.0.0.0
      --port 8080
      -ngl 99
      -sm tensor
      -ts 0.5,0.5
      -t 10
      -np 1
      -c 262144
      --rope-scaling yarn
      --rope-scale 1.4441
      --yarn-orig-ctx 262144
      --batch-size 4096
      --ubatch-size 4096
      --cont-batching
      --timeout 10
      --no-mmap
      --cache-prompt
      --spec-type draft-mtp
      --spec-draft-n-max 3
      --spec-draft-n-min 0
      --spec-draft-p-min 0
      -fit off
      -fa on
      --no-prefill-assistant
      --reasoning-preserve
    restart: always
