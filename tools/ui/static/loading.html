<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<!-- backstop: if the poll loop below ever stalls or JS is disabled, this
		     still reloads periodically so the page recovers to the real UI once
		     the model is ready (the server serves the app instead of this page). -->
		<meta http-equiv="refresh" content="20" />
		<title>Loading model…</title>
		<style>
			:root {
				color-scheme: light dark;
				--bg: #ffffff;
				--fg: #0a0a0a;
				--muted: #6b7280;
				--card: #f4f4f5;
				--border: #e4e4e7;
				--bar: #18181b;
				--track: #e4e4e7;
				--ok: #16a34a;
			}
			@media (prefers-color-scheme: dark) {
				:root {
					--bg: #09090b;
					--fg: #fafafa;
					--muted: #a1a1aa;
					--card: #18181b;
					--border: #27272a;
					--bar: #fafafa;
					--track: #27272a;
					--ok: #22c55e;
				}
			}
			* { box-sizing: border-box; }
			body {
				margin: 0;
				font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
				background: var(--bg);
				color: var(--fg);
				display: flex;
				justify-content: center;
				padding: 2rem 1rem;
			}
			main { width: 100%; max-width: 46rem; }
			h1 { font-size: 1.15rem; margin: 0 0 0.25rem; display: flex; align-items: center; gap: 0.5rem; }
			.dot {
				width: 0.6rem; height: 0.6rem; border-radius: 50%;
				background: var(--ok); flex: none;
				animation: pulse 1.2s ease-in-out infinite;
			}
			@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }
			.sub { color: var(--muted); font-size: 0.8rem; margin: 0 0 1.25rem; }
			.stage { font-size: 0.8rem; color: var(--muted); margin: 0 0 0.35rem; }
			.track {
				height: 0.5rem; border-radius: 0.5rem; background: var(--track);
				overflow: hidden; margin-bottom: 1.5rem;
			}
			.track > div {
				height: 100%; background: var(--bar); border-radius: 0.5rem;
				width: 0%; transition: width 0.4s ease;
			}
			h2 { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); margin: 0 0 0.5rem; }
			.worker {
				border: 1px solid var(--border); border-radius: 0.5rem;
				background: var(--card); padding: 0.6rem 0.75rem; margin-bottom: 0.5rem;
			}
			.wrow { display: flex; justify-content: space-between; align-items: baseline; gap: 0.5rem; }
			.ep { font-weight: 600; font-size: 0.85rem; display: inline-flex; align-items: center; gap: 0.4rem; }
			.ep svg { width: 0.95rem; height: 0.95rem; flex: none; color: var(--muted); }
			.rate { font-size: 0.85rem; color: var(--muted); font-variant-numeric: tabular-nums; }
			.meta { font-size: 0.72rem; color: var(--muted); margin-top: 0.25rem; font-variant-numeric: tabular-nums; }
			.empty { color: var(--muted); font-size: 0.8rem; padding: 0.75rem 0; }
			.badges { display: flex; gap: 0.35rem; margin-top: 0.3rem; flex-wrap: wrap; }
			.badge {
				font-size: 0.65rem; padding: 0.05rem 0.4rem; border-radius: 0.6rem;
				border: 1px solid var(--border); color: var(--muted); white-space: nowrap;
			}
			.badge.score { color: var(--fg); font-weight: 600; }
		
			.pbar { height: 6px; border-radius: 3px; background: #2223; overflow: hidden; display: flex; margin: 4px 0 2px; }
			.pfill-c { background: #4ade80; height: 100%; }
			.pfill-s { background: #60a5fa; height: 100%; }
			.chip { font-size: 10px; padding: 1px 6px; border-radius: 8px; margin-left: 6px; }
			.chip.ready { background: #16a34a33; color: #16a34a; }
			.chip.cache { background: #4ade8033; color: #4ade80; }
			.chip.stream { background: #60a5fa33; color: #60a5fa; }
			.chip.wait { background: #8883; }
			details.meta > summary { cursor: pointer; font-size: 11px; opacity: 0.6; }
</style>
	</head>
	<body>
		<main>
			<h1><span class="dot"></span>Loading model across the fleet</h1>
			<p class="sub" id="model">The UI will open automatically when the model is ready.</p>

			<div class="stage" id="stage">Initializing…</div>
			<div class="track"><div id="bar"></div></div>

			<h2 id="workers-title">Workers</h2>
			<div id="workers"><div class="empty">Connecting to workers…</div></div>
		</main>

		<script>
			// remember each endpoint's last byte count + time to derive MB/s
			const prev = Object.create(null);
			const MiB = 1024 * 1024;
			let inFlight = false; // don't stack fetches if the server stalls

			function esc(s) {
				return String(s).replace(/[&<>"]/g, (c) =>
					({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' })[c]
				);
			}

			// device-kind icons (lucide Gpu / Cpu, inlined - no libraries on this page)
			const SVG_OPEN =
				'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" ' +
				'stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">';
			const ICON_GPU = SVG_OPEN +
				'<path d="M2 21V3"/><path d="M2 5h18a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H2.26"/>' +
				'<path d="M7 17v3a1 1 0 0 0 1 1h5a1 1 0 0 0 1-1v-3"/>' +
				'<circle cx="16" cy="11" r="2"/><circle cx="8" cy="11" r="2"/></svg>';
			const ICON_CPU = SVG_OPEN +
				'<path d="M12 20v2"/><path d="M12 2v2"/><path d="M17 20v2"/><path d="M17 2v2"/>' +
				'<path d="M2 12h2"/><path d="M2 17h2"/><path d="M2 7h2"/><path d="M20 12h2"/>' +
				'<path d="M20 17h2"/><path d="M20 7h2"/><path d="M7 20v2"/><path d="M7 2v2"/>' +
				'<rect x="4" y="4" width="16" height="16" rx="2"/><rect x="8" y="8" width="8" height="8" rx="1"/></svg>';

			function kindIcon(w) {
				// worker_is_cpu: true = worker CPU/RAM, false = GPU, null/undefined = unknown
				if (w.worker_is_cpu === true) return ICON_CPU;
				if (w.worker_is_cpu === false) return ICON_GPU;
				return w.endpoint ? '' : ICON_GPU; // local pipeline devices are GPUs
			}

			function fmtBytes(n) {
				if (n >= 1024 * MiB) return (n / (1024 * MiB)).toFixed(2) + ' GB';
				if (n >= MiB) return (n / MiB).toFixed(1) + ' MB';
				if (n >= 1024) return (n / 1024).toFixed(0) + ' KB';
				return n + ' B';
			}

			// the SPA stores its config (incl. the API key) in localStorage; the
			// static loading page has no settings UI, so read the same key here or
			// /fleet/status 401s when the coordinator runs with --api-key
			function apiKeyHeader() {
				try {
					const cfg = JSON.parse(localStorage.getItem('LlamaUi.config') || '{}');
					const key = (cfg.apiKey || '').toString().trim();
					return key ? { Authorization: 'Bearer ' + key } : {};
				} catch (e) {
					return {};
				}
			}

			async function tick() {
				if (inFlight) return;
				inFlight = true;
				let d;
				try {
					const r = await fetch('./fleet/status', { cache: 'no-store', headers: apiKeyHeader() });
					if (!r.ok) throw new Error(r.status);
					d = await r.json();
				} catch (e) {
					return; // server not answering yet — keep the current view, retry
				} finally {
					inFlight = false;
				}

				if (d.server_state && d.server_state !== 'loading' && d.server_state !== 'reloading') {
					location.href = './'; // ready/sleeping — the real UI is served now
					return;
				}

				// what is being loaded + how it will be split
				if (d.model && d.model.path) {
					document.getElementById('model').textContent =
						d.model.path +
						(d.model.size_bytes ? ' · ' + fmtBytes(d.model.size_bytes) : '') +
						(d.split_mode ? ' · split: ' + d.split_mode : '') +
						(d.preflight ? ' · preflight: ' + d.preflight.tps.toFixed(1) + ' t/s (' + d.preflight.model + ')' : '') +
						' — the UI will open automatically when ready.';
				}

				const lp = d.load_progress || {};
				document.getElementById('stage').textContent =
					'Stage: ' + (lp.stage || '…') +
					(typeof lp.value === 'number' ? '  ·  ' + Math.round(lp.value * 100) + '%' : '');
				document.getElementById('bar').style.width =
					(typeof lp.value === 'number' ? Math.max(2, lp.value * 100) : 2) + '%';

				const now = performance.now();
				const workers = Array.isArray(d.load_workers) ? d.load_workers.slice() : [];
				// fastest first, more free memory breaking ties; unscored sink below,
				// local devices (no endpoint) keep their pipeline position at the end
				workers.sort((a, b) => {
					const as = a.score ? a.score.bw_gbps : -1;
					const bs = b.score ? b.score.bw_gbps : -1;
					if (as !== bs) return bs - as;
					return (b.free_mib ?? -1) - (a.free_mib ?? -1);
				});

				const host = document.getElementById('workers');
				if (workers.length === 0) {
					host.innerHTML = '<div class="empty">Connecting to workers…</div>';
					return;
				}
				host.innerHTML = workers.map((w) => {
					const key = w.endpoint || w.name;
					const label = w.endpoint ? w.name + ' \u00b7 ' + w.endpoint : w.name + ' \u00b7 local';
					const p = prev[key] || {};
					const cachedMib = w.weights_cached_mib || 0, streamedMib = w.weights_streamed_mib || 0;
					// #56: progress vs expected share. RPC = cached+streamed bytes;
					// local devices = VRAM delta from the load-start snapshot.
					const modelMib = d.model && d.model.size_bytes ? d.model.size_bytes / MiB : 0;
					const expected = w.attn_owner || !w.split_frac ? 0 : w.split_frac * modelMib;
					let doneMib = cachedMib + streamedMib;
					if (!w.endpoint && w.free_start_mib != null && w.free_mib != null) {
						doneMib = Math.max(doneMib, w.free_start_mib - w.free_mib);
					}
					const pct = expected > 0 ? Math.min(100, (100 * doneMib) / expected) : 0;
					const ready = expected > 0 && pct >= 97;
					// state chip from counter motion between polls
					let chip = '<span class="chip wait">waiting</span>';
					if (ready) chip = '<span class="chip ready">READY</span>';
					else if (streamedMib > (p.streamed ?? 0)) chip = '<span class="chip stream">streaming</span>';
					else if (cachedMib > (p.cached ?? 0)) chip = '<span class="chip cache">loading from cache</span>';
					else if (doneMib > (p.done ?? 0)) chip = '<span class="chip cache">loading</span>';
					// headline: MB/s while active, share when done
					let rate = '';
					if (w.bytes_sent != null && p.t && now > p.t) {
						const bps = ((w.bytes_sent - (p.bytes || 0)) / (now - p.t)) * 1000;
						rate = ready ? Math.round(pct) + '%' : bps > 0 ? (bps / MiB).toFixed(1) + ' MB/s' : '\u2026';
					}
					prev[key] = { bytes: w.bytes_sent || 0, t: now, cached: cachedMib, streamed: streamedMib, done: doneMib };
					// two-tone bar: cached (green) + streamed (blue) of expected
					const cw = expected > 0 ? Math.min(100, (100 * cachedMib) / expected) : 0;
					const sw = expected > 0 ? Math.min(100 - cw, (100 * streamedMib) / expected) : 0;
					const lw = !w.endpoint && expected > 0 ? Math.min(100, (100 * doneMib) / expected) : 0;
					const bar = expected > 0
						? '<div class="pbar" title="' + Math.round(pct) + '% of ~' + (expected / 1024).toFixed(1) + ' GiB share">' +
						  (w.endpoint
							? '<div class="pfill-c" style="width:' + cw + '%"></div><div class="pfill-s" style="width:' + sw + '%"></div>'
							: '<div class="pfill-c" style="width:' + lw + '%"></div>') + '</div>'
						: '';
					// #57: one primary badge line; everything else behind <details>
					const badges = [];
					if (w.attn_owner) badges.push('<span class="badge score">attention owner</span>');
					else if (w.split_frac != null) badges.push('<span class="badge">' + Math.round(w.split_frac * 100) + '% share</span>');
					if (cachedMib > 0) badges.push('<span class="badge score">' + (cachedMib / 1024).toFixed(1) + ' GiB cached</span>');
					if (streamedMib > 0) badges.push('<span class="badge">' + (streamedMib / 1024).toFixed(1) + ' GiB streamed</span>');
					const detail = [
						w.score ? w.score.bw_gbps.toFixed(1) + ' GB/s' : null,
						w.n_layers != null ? w.n_layers + ' layers' : null,
						w.free_mib != null ? (w.free_mib / 1024).toFixed(1) + ' GiB free' : null,
						w.bytes_sent != null ? fmtBytes(w.bytes_sent) + ' uploaded' : null,
						w.calls != null ? (w.calls | 0) + ' calls' : null,
						w.ewma_latency_us ? 'rtt ' + (w.ewma_latency_us / 1000).toFixed(1) + ' ms' : null,
					].filter(Boolean).join(' \u00b7 ');
					return (
						'<div class="worker"><div class="wrow">' +
						'<span class="ep">' + kindIcon(w) + esc(label) + chip + '</span>' +
						'<span class="rate">' + rate + '</span></div>' +
						bar +
						'<div class="badges">' + badges.join('') + '</div>' +
						(detail ? '<details class="meta"><summary>details</summary>' + detail + '</details>' : '') +
						'</div>'
					);
				}).join('');
			}

			tick();
			setInterval(tick, 1500);
		</script>
	</body>
</html>
