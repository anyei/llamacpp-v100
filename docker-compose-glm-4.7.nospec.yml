# GLM-4.7-Flash-UD serving profile (single GPU, no speculation — GLM has no MTP head).
# Measured 2026-07-09 (1x V100): 89.5 t/s decode / 185 pp single-stream.
# Single-GPU is the recommended GLM config: tensor mode is byte-identical but
# SLOWER for this A3B MoE (86-70 t/s, AllReduce overhead), and MLA's compact KV
# (~10 GB for the FULL 202,752-token native context) fits one 32 GB card with
# ~5 GB headroom — 2 GPUs add nothing. See TASKS.md item 13.
#
# KV q8_0 (--cache-type-*) is verified-lossless on Qwen and halves KV memory;
# with GLM's tiny MLA KV it matters less — remove the lines to trade back ~3% tg.

services:
  llama-tq:
    container_name: llama-tq-nospec-GLM-4.7-Flash-UD-Q4_K_XL
    image: llamacpp-local-v100:latest
    volumes:
      - ${MODELS_DIR:-./models}:/models
      - ${MODELS2_DIR:-./models2}:/models2
      - ./cache:/models/cache
    ports:
      - "8097:8080"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - CUDA_VISIBLE_DEVICES=0
      # small-batch decode graph cache (helps multi-slot shape churn even
      # without speculation; needs image >= commit 9bac6eead, ignored otherwise)
      - LLAMA_DECODE_GRAPH_CACHE=4
      - LLAMA_DECODE_GRAPH_CACHE_TOKENS=64
    # -c 202752 = GLM's FULL native context; measured 27.6 GB peak on one V100
    # (with default ubatch). If the 4096 ubatch pushes compute buffers into OOM,
    # drop to -c 131072 or -ub 2048.
    command: >
      -m /models/GLM-4.7-Flash-UD-Q4_K_XL.gguf?download=true
      --host 0.0.0.0
      --port 8080
      -ngl 99
      -t 10
      -np 1
      -c 202752
      --batch-size 4096
      --ubatch-size 4096
      --cont-batching
      --timeout 10
      --no-mmap
      --cache-prompt
      --cache-ram 12288
      --ctx-checkpoints 8
      -fit off
      -fa on
      --no-prefill-assistant
    restart: always
